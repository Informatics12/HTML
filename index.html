<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вчитель інформатики: Цитата та Щоденник</title>
    <style>
        :root {
            --primary: #6366f1;
            --secondary: #a855f7;
            --background: #2d2a6e;
            --glass: rgba(255, 255, 255, 0.03);
            --blur: blur(20px);
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(-45deg, #1e1a3d, #2d2a6e, #1e1a3d, #2d2a6e);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            width: 90%;
            max-width: 800px;
            padding: 40px;
            background: var(--glass);
            backdrop-filter: var(--blur);
            -webkit-backdrop-filter: var(--blur);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        }

        /* Стилі для цитати дня */
        .quote-block {
            padding: 30px;
            border-radius: 15px;
            background: rgba(0, 0, 0, 0.1);
            margin-bottom: 30px;
            position: relative;
            overflow: hidden;
            border: 2px solid transparent;
            /* Анімована рамка */
            border-image: linear-gradient(90deg, #6366f1, #a855f7, #6366f1) 1;
            animation: borderGlow 3s linear infinite;
        }

        @keyframes borderGlow {
            0% { border-image-source: linear-gradient(90deg, #6366f1, #a855f7, #6366f1); }
            50% { border-image-source: linear-gradient(90deg, #a855f7, #6366f1, #a855f7); }
            100% { border-image-source: linear-gradient(90deg, #6366f1, #a855f7, #6366f1); }
        }

        .quote-block::before {
            content: "“";
            position: absolute;
            top: -10px;
            left: 20px;
            font-size: 100px;
            color: rgba(99, 102, 241, 0.3);
            font-family: Georgia, serif;
        }

        .quote-block p {
            margin: 0;
            font-size: 1.3rem;
            line-height: 1.6;
            color: #d1d5db;
        }

        .quote-author {
            display: block;
            text-align: right;
            margin-top: 15px;
            font-size: 0.95rem;
            color: #a1a1aa;
        }

        /* Стилі для посилання на щоденник */
        .diary-block {
            text-align: center;
        }

        .diary-link {
            display: inline-flex;
            align-items: center;
            padding: 15px 30px;
            background: var(--primary);
            color: white;
            text-decoration: none;
            border-radius: 10px;
            font-weight: bold;
            font-size: 1.1rem;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4);
        }

        .diary-link:hover {
            transform: scale(1.05) translateY(-5px);
            background: #4f46e5;
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.6);
        }

        .diary-icon {
            margin-right: 12px;
            font-size: 1.4rem;
        }

    </style>
</head>
<body>

<div class="container">
    <div class="quote-block">
        <p>Технології — це всього лише інструмент. Щоб змусити дітей працювати разом та мотивувати їх, вчитель є найважливішим.</p>
        <span class="quote-author">— Білл Гейтс</span>
    </div>

    <div class="diary-block">
        <a href="https://mriia.gov.ua/app" class="diary-link">
            <span class="diary-icon">📅</span>
            Відкрити посилання на щоденник
        </a>
    </div>
</div>

</body>
</html>
